# P1 E2E: Image Attachment Button Behavior

appId: ai.offgridmobile.dev
name: "P1: Image Attachment"
tags:
  - p1
  - attachment
  - image
---

- runFlow: 00-setup-model.yaml

- tapOn:
    id: "new-chat-button"
- extendedWaitUntil:
    visible:
      id: "chat-screen"
    timeout: 10000

- assertVisible:
    id: "camera-button"
- tapOn:
    id: "camera-button"

# Vision-disabled path.
- runFlow:
    when:
      visible:
        text: "Vision Not Supported"
    commands:
      - tapOn:
          text: "OK"

# Vision-enabled path variants.
- runFlow:
    when:
      visible:
        text: "Camera"
    commands:
      - runFlow:
          when:
            visible:
              text: "Cancel"
          commands:
            - tapOn:
                text: "Cancel"
- runFlow:
    when:
      visible:
        text: "Choose from Library"
    commands:
      - runFlow:
          when:
            visible:
              text: "Cancel"
          commands:
            - tapOn:
                text: "Cancel"

# Fallback if native picker is still open.
- runFlow:
    when:
      notVisible:
        id: "chat-input"
    commands:
      - back

- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 5000

- tapOn:
    id: "chat-input"
- inputText: "Say OK"
- hideKeyboard
- tapOn:
    id: "send-button"

- extendedWaitUntil:
    visible:
      id: "assistant-message"
    timeout: 60000

- evalScript: "${console.log('P1_IMG_ATTACH - passed')}"
