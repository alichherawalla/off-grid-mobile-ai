# P3 E2E: Image Model Uninstall

appId: ai.offgridmobile.dev
name: "P3: Image Model Uninstall"
tags:
  - p3
  - image
  - uninstall
---

# Ensure at least one image model exists in a clean state.
- runFlow: 07b-image-model-download.yaml

- extendedWaitUntil:
    visible:
      id: "downloaded-models-screen"
    timeout: 10000

- tapOn:
    id: "delete-model-button"
    index: 0

- extendedWaitUntil:
    visible:
      text: "Delete Image Model"
    timeout: 5000
- tapOn:
    text: "Delete"

- extendedWaitUntil:
    notVisible:
      text: "Delete Image Model"
    timeout: 10000

- evalScript: "${console.log('P3_IMG_UNINSTALL - passed')}"
