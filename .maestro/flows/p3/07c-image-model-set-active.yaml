# P3 E2E: Set Active Image Model from Home Picker

appId: ai.offgridmobile.dev
name: "P3: Image Model Set Active"
tags:
  - p3
  - image
  - active
---

# Ensure image model exists.
- runFlow: 07b-image-model-download.yaml

# Go to Home and use the Image picker card.
- tapOn:
    id: "home-tab"
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 10000

# If already active, unload first so selection path is exercised.
- runFlow:
    when:
      notVisible:
        text: "Tap to select"
    commands:
      - tapOn:
          id: "image-model-card"
      - extendedWaitUntil:
          visible:
            text: "Image Models"
          timeout: 5000
      - tapOn:
          text: "Unload current model"
      - extendedWaitUntil:
          visible:
            text: "Tap to select"
          timeout: 30000

- tapOn:
    id: "image-model-card"
- extendedWaitUntil:
    visible:
      text: "Image Models"
    timeout: 5000

- tapOn:
    id: "model-item"
    index: 0

- extendedWaitUntil:
    notVisible:
      text: "Tap to select"
    timeout: 30000

- evalScript: "${console.log('P3_IMG_SET_ACTIVE - passed')}"
