# P1 E2E: Document Attachment

appId: ai.offgridmobile.dev
name: "P1: Document Attachment"
tags:
  - p1
  - attachment
  - document
---

- runFlow: 00-setup-model.yaml

- tapOn:
    id: "new-chat-button"
- extendedWaitUntil:
    visible:
      id: "chat-screen"
    timeout: 10000

- assertVisible:
    id: "document-picker-button"
- tapOn:
    id: "document-picker-button"

# Dismiss native picker (platform-dependent behavior).
- runFlow:
    when:
      visible:
        text: "Cancel"
    commands:
      - tapOn:
          text: "Cancel"
- runFlow:
    when:
      visible:
        text: "Done"
    commands:
      - tapOn:
          text: "Done"
- runFlow:
    when:
      notVisible:
        id: "chat-input"
    commands:
      - back

- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 5000

- tapOn:
    id: "chat-input"
- inputText: "Hello"
- hideKeyboard
- assertVisible:
    id: "send-button"

- tapOn:
    id: "send-button"
- extendedWaitUntil:
    visible:
      id: "assistant-message"
    timeout: 60000

- evalScript: "${console.log('P1_DOC_ATTACH - passed')}"
