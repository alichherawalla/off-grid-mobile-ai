# P3 E2E: Image Model Download + Download Manager Registration

appId: ai.offgridmobile.dev
name: "P3: Image Model Download"
tags:
  - p3
  - image
  - download
---

- clearState
- runFlow: _helpers-launch-home.yaml

- tapOn:
    id: "models-tab"
- extendedWaitUntil:
    visible:
      id: "models-screen"
    timeout: 10000

- tapOn:
    text: "Image Models"
- extendedWaitUntil:
    visible:
      id: "image-model-card-0"
    timeout: 15000

# Start download when needed.
- runFlow:
    when:
      visible:
        id: "image-model-card-0-download"
    commands:
      - tapOn:
          id: "image-model-card-0-download"
      - extendedWaitUntil:
          visible:
            text: "Success"
          timeout: 240000
      - tapOn:
          text: "OK"

# Verify model is visible in Download Manager as an image model entry.
- tapOn:
    id: "downloads-icon"
- extendedWaitUntil:
    visible:
      id: "downloaded-models-screen"
    timeout: 10000
- assertVisible:
    text: "Image Generation"

- evalScript: "${console.log('P3_IMG_DOWNLOAD - passed')}"
