# P1 E2E: Text Generation - Retry

appId: ai.offgridmobile.dev
name: "P1: Text Generation Retry"
tags:
  - p1
  - generation
  - retry
---

- runFlow: 00-setup-model.yaml

- tapOn:
    id: "new-chat-button"
- extendedWaitUntil:
    visible:
      id: "chat-screen"
    timeout: 10000

- tapOn:
    id: "chat-input"
- inputText: "Say exactly: FIRST"
- hideKeyboard
- tapOn:
    id: "send-button"

- extendedWaitUntil:
    visible:
      id: "assistant-message"
    timeout: 60000

- longPressOn:
    id: "assistant-message"
- extendedWaitUntil:
    visible:
      id: "action-menu"
    timeout: 5000
- tapOn:
    id: "action-retry"

- extendedWaitUntil:
    visible:
      id: "assistant-message"
    timeout: 60000

- runFlow:
    when:
      visible:
        id: "generation-meta"
    commands:
      - evalScript: "${console.log('P1_RETRY - generation meta visible')}"

- assertVisible:
    id: "chat-input"
- evalScript: "${console.log('P1_RETRY - passed')}"
