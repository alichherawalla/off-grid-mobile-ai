# P1 E2E: Text Generation - Full Flow

appId: ai.offgridmobile.dev
name: "P1: Text Generation Full"
tags:
  - p1
  - generation
  - text
---

- runFlow: 00-setup-model.yaml

- tapOn:
    id: "new-chat-button"
- extendedWaitUntil:
    visible:
      id: "chat-screen"
    timeout: 10000

- assertVisible:
    id: "model-selector"
- assertVisible:
    id: "model-loaded-indicator"

- tapOn:
    id: "chat-input"
- inputText: "Hello, respond with one word: OK"

# PR coverage: action buttons stay visible while typing / keyboard open.
- assertVisible:
    id: "document-picker-button"
- assertVisible:
    id: "camera-button"
- assertVisible:
    id: "image-mode-toggle"

- hideKeyboard
- tapOn:
    id: "send-button"

- extendedWaitUntil:
    visible:
      id: "user-message"
    timeout: 5000
- extendedWaitUntil:
    visible:
      id: "assistant-message"
    timeout: 60000

# Optional depending on settings.
- runFlow:
    when:
      visible:
        id: "generation-meta"
    commands:
      - evalScript: "${console.log('P1_TEXT_FULL - generation meta visible')}"

- longPressOn:
    id: "assistant-message"
- extendedWaitUntil:
    visible:
      id: "action-menu"
    timeout: 5000

- assertVisible:
    id: "action-copy"
- assertVisible:
    id: "action-retry"
- tapOn:
    id: "action-copy"

- tapOn:
    id: "chat-input"
- inputText: "Now say the word HELLO"
- hideKeyboard
- tapOn:
    id: "send-button"

- extendedWaitUntil:
    visible:
      id: "message-text"
    timeout: 60000

- tapOn:
    id: "chat-settings-icon"
- extendedWaitUntil:
    visible:
      text: "Temperature"
    timeout: 5000
- tapOn:
    text: "Done"

- assertVisible:
    id: "chat-input"
- assertVisible:
    id: "document-picker-button"

- evalScript: "${console.log('P1_TEXT_FULL - passed')}"
